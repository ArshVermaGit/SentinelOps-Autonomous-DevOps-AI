name: Greetings

on: [pull_request, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to SentinelOps! 🛡️ Thanks for opening your first issue. Our AI agents will take a look shortly."
          pr-message: "Welcome to SentinelOps! 🚀 Thanks for your first PR. We'll analyze it for risks and get back to you soon."
